<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .container{
        display:grid;
         grid-template-columns: 300px 300px auto;
          height: 75vh; 
          
         background-color: aqua;

    }
    div{
        border: 1px solid red;
        background-color: blue;
    
        text-align: center;
    }
    div:hover{
        background-color: yellow;
    }
    @media  (max-width:700px) {
        .container{
            /* grid-column: 1/3;
            grid-row: 1/2; */
            grid-template-areas: 
            "a a b"
            "c d e"
            "f f g";
        }
        .a{
            grid-area: a;
        }
       .b{
            grid-area: b;
        } 
        .c{
            grid-area: c;
        }
        .d{
            grid-area: d;
        }
        .e{
            grid-area: e;
        }
        .f{
            grid-area: f;
        }
        .g{
            grid-area: g;
        }
    }
    </style>
</head>
<body>
      <div class="container">
      <div class="a">A</div>
      <div class="b">B</div>
      <div class="c">C</div>
      <div class="d">D</div>
      <div class="e">E</div>
        <div class="f">F</div>
        <div class="g">G</div>

      </div>
</body>
</html>
