<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .NavBar{
            background-color: aqua;
            height: 60px;
            line-height :50px;
            text-align: center;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 10px;

        }
        .NavBar:hover{
            background-color: yellowgreen;
        }
        
            .container{
           background-color: grey;
            height: 300px;
              border: 2px solid red;
            border-radius: 30px;
            position: relative;
            text-align: center;
            line-height: 350px;
            
}
.container:hover{
    background-color: gold;

}
.box{
    width: 80px;
    height: 40px;
    border: 2px solid green;
    background-color: aquamarine;
    border-radius: 10px;
    position: absolute;
    text-align: center;
    line-height: 40px ;
}

.a{ top:30px; left:40px; }
.b{ top:30px; right:40px;  }
.d{ bottom:30px; left:40px;  }

.e{ bottom: 30px; right: 40px;}
.c{ top:45% ;left:45%} 
.box:hover{
    background-color: blueviolet;
}
        
    </style>

</head>
<body>
    <div class="NavBar">NavBar</div>
    <div class="container">
        <div class="box a">A</div>
            <div class="box b">B</div>
             <div class="box d">D</div>
              <div class="box e">E</div>
                <div class="box c">C</div>
        
    </div>

    
</body>
</html>
