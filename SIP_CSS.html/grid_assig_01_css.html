<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
             display: grid;
            height: 99vh;
            
            grid-template-columns:repeat(4,1fr) ;
            grid-template-rows: repeat(3,1fr);
            grid-template-areas: 
                  "red red black blue"
                  "pink green green blue"
                  "pink yellow yellow yellow";
            /* color: aqua;     */
            text-align: center;  
            
             }
             .red{
                background-color: red;
                /* grid-row: 1/2;
                grid-column: 1/3; */
                 grid-area: red;

             }
             .black{
                background-color: black;
                /* grid-row: 1/2;
                grid-column: 3/4; */
                grid-area: black;
             }
             .blue{
                background-color: blue;
                /* grid-row: 1/3;
                grid-column: 4/5 ; */
                grid-area: blue;
             }
             .pink{
                background-color: pink;
                /* grid-row: 2/4 ;
                grid-column:1/2; */
                grid-area: pink;
             }
             .green{
                background-color: green;
                /* grid-row: 2/3;
                grid-column: 2/4; */
                grid-area: green;
             }
             .yellow{
                background-color: yellow;
                /* grid-row: 3/4;
                grid-column: 2/5; */
                grid-area: yellow;
             }
             

    </style>
</head>
<body>
    <div class="container">
        <div class="red">RED</div>
        <div class="black">BLACK</div>
        <div class="blue">BLUE</div>
        <div class="pink"> PINK</div>
        <div class="green"> GREEN</div>
        <div class="yellow">YELLOW</div>
    </div>
</body>
</html>
