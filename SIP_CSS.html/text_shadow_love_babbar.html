<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            background-color: beige;
            height: 350px;
            border: 2px solid black;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container:hover{
            background-color: greenyellow;
        }
        
        .box{
            background-color: aquamarine;
            width: 250px;
            height: 280px;
            border-radius: 10px;
            border: 1px solid brown;
            margin: 15px;padding: 10px;

        }
        .box:hover{
            background-color: orange;
        }
        #head1{
            /* text-shadow: 2px 3px 1px red;            X upset ,y upset, for blur ke liya  */
            /* text-shadow: yellow 2px 3px 2px ;           color ,x upset ,y upset, blur */
            /* text-shadow: green 2px 6px;                color , x upset ,y upset */
            /* text-shadow: 2px 4px;                        x upset ,y upset yaha color by defult hi show karta hai */
             text-shadow: 2px 2px 5px red, 4px 4px 8px blue, 6px 6px 10px green; 
             /* this is for multiple color ke liye         */
        }
    </style>
</head>
<body>
    <div class="container">
        
        <div class="box">
            <img src="Rohit-Sharma.jpg" width="100" height="100"/>
            <h2 id="head1"> Ro-Hit Sharma</h2>
            <p>Rohit Sharma is one of India's finest cricketers and a successful captain. <br>
             He is known for his elegant batting and record-breaking performances in international cricket.
</p>
        </div>
    </div>
</body>
</html>
