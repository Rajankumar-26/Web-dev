<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Javascript Learning</h2>

<p id="myid">JavaScript can change HTML content.</p>

<button type="button" onclick='document.getElementById("myid").innerHTML = "Hello JavaScript!"'>Click Me!</button>
<button type="button" onclick="document.getElementById('myid').style.fontSize='35px'">Click Me!</button>
<button type="button" onclick="document.getElementById('myid').style.color='blue'"">Click Me!</button>
<button type="button" onclick="document.getElementById('myid').style.textAlign='center'"">click me</button>
<button type="button" onclick="document.getElementById('myid').style.background='red'"">click me</button>
<button type="button" onclick="document.getElementById('myid').style.border='2px solid yellow'"">click me</button>
</body>
</html>`
