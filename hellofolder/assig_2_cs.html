<!DOCTYPE html>
<html>
<head>
    <title>Interactive Cards</title>
    <style>
        .card {
            width: 150px;
            padding: 10px;
            margin: 10px;
            border: 2px solid black;
            border-radius: 10px; /* Round Corners */
            display: inline-block;
            text-align: center;
            transition: 0.2s;
        }

        .card img {
            width: 50%;
            height: 100px;
            border-radius: 10px;
        }

        .card:hover {
            background-color: lightblue;
            border: 4px solid red;
        }
    </style>
</head>
<body>
   
    <div class="card">
        <img src="image1.jpg" alt="Card Image">
        <h3>Card 1</h3>
        <p>Content of Card 1 </p>
    </div>

    <div class="card">
        <img src="image2.jpg" alt="Card Image">
        <h3>Card 2</h3>
        <p>Content of Card 2</p>̥
        </div>

        

    <div class="card">
        <img src="image3.jpg" alt="Card Image">
        <h3>Card 3</h3>
        <p>Content of Card 3</p>
    </div>

</body>
</html>
